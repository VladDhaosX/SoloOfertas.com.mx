<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio — Solo Ofertas Guadalajara</title>
  <link rel="stylesheet" href="/shared/css/base.css">
  <link rel="stylesheet" href="/shared/css/header.css">
  <link rel="stylesheet" href="/shared/css/footer.css">
  <link rel="stylesheet" href="/shared/css/inicio.css">
</head>
<body data-region="gdl">

  <div id="header-placeholder"></div>

  <main>
    <section class="hero" aria-label="Videos destacados" aria-roledescription="carrusel">
      <div class="hero-carousel" data-hero-carousel>
        <video class="hero-video is-active" autoplay muted playsinline preload="auto" data-hero-slide>
          <source src="/shared/img/hero-destacado.mp4" type="video/mp4">
        </video>
        <video class="hero-video" muted playsinline preload="metadata" data-hero-slide>
          <source src="/shared/img/hero-gdl.mp4" type="video/mp4">
        </video>
      </div>
      <div class="hero-overlay">
        <h2>Las Mejores Ofertas</h2>
        <p>Promociones, anuncios y campañas cerca de ti</p>
      </div>
      <div class="hero-carousel-controls" aria-label="Seleccionar video">
        <button class="hero-carousel-dot is-active" type="button" data-hero-index="0" aria-label="Mostrar video 1 de 2" aria-current="true"></button>
        <button class="hero-carousel-dot" type="button" data-hero-index="1" aria-label="Mostrar video 2 de 2" aria-current="false"></button>
      </div>
    </section>

    <section class="vacantes-section vacantes-section-mixta">
      <div class="container">
        <div id="vacantes-grid" class="vacantes-grid vacantes-grid-mixta" data-ssr="vacantes">
          <!-- SSR:CUPONES -->
          <!-- SSR:VACANTES -->
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="/shared/js/components.js"></script>
  <script src="/shared/js/inicio.js"></script>
</body>
</html>
